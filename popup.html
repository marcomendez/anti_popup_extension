<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    .section {
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #ddd;
    }
    .section:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }
    .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }
    .site-label {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: 0.3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #4CAF50;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    input:disabled + .slider {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 4px;
    }
    .current-site {
      font-size: 11px;
      color: #666;
      text-align: center;
      margin-bottom: 8px;
      word-break: break-all;
    }
    .btn {
      width: 100%;
      padding: 8px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn:hover {
      background: #1976D2;
    }
    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .btn.off {
      background: #f44336;
    }
    .btn.off:hover {
      background: #d32f2f;
    }
  </style>
</head>
<body>
  <div class="current-site" id="currentSite">Cargando...</div>
  
  <div class="section">
    <div class="container">
      <span class="label">Extensión global</span>
      <label class="switch">
        <input type="checkbox" id="globalToggle">
        <span class="slider"></span>
      </label>
    </div>
    <div class="status" id="globalStatus">Desactivada</div>
  </div>

  <div class="section">
    <div class="container">
      <span class="label">Bloqueo en este sitio</span>
      <label class="switch">
        <input type="checkbox" id="siteToggle" disabled>
        <span class="slider"></span>
      </label>
    </div>
    <div class="status" id="siteStatus">Desactivado</div>
  </div>

  <button class="btn" id="toggleSiteBtn">Activar este sitio</button>
  <script src="popup.js"></script>
</body>
</html>
